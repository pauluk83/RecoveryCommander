# RecoveryCommander build, package, sign, and release workflow.
#
# Behavior:
# - PR + push to main: build (Debug + Release), publish Release single-file exe.
# - main + Release:    publish Core/Contracts NuGet packages to GitHub Packages.
# - tag v*:            zip + Authenticode-sign (when secret present) + publish SHA256SUMS + GitHub Release.
#
# Required repo secrets for signing (optional - skipped gracefully when missing):
#   SIGNING_PFX_BASE64   - base64-encoded .pfx
#   SIGNING_PFX_PASSWORD - the .pfx password

name: .NET Core Desktop

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    permissions:
      contents: write
      packages: write

    env:
      Solution_Name: RecoveryCommander.sln

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Ensure Module folder placeholder
        run: mkdir -p bin/${{ matrix.configuration }}/net10.0-windows/win-x64/publish/Module

      - name: Restore Dependencies
        run: dotnet restore $env:Solution_Name

      - name: Build Solution
        run: dotnet build $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore

      - name: Run Tests
        if: matrix.configuration == 'Release'
        run: dotnet test $env:Solution_Name --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload Test Results
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: ./TestResults/
        continue-on-error: true

      - name: Publish Executable
        run: dotnet publish RecoveryCommander.csproj --configuration ${{ matrix.configuration }} --runtime win-x64 --self-contained false -p:PublishSingleFile=true -p:PublishReadyToRun=true --output ./publish/${{ matrix.configuration }}

      # ----- Authenticode signing (tag-only, secret-gated) -----
      - name: Decide if signing is enabled
        id: sign_decision
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:SIGNING_PFX_BASE64)) {
            Write-Host "SIGNING_PFX_BASE64 is not set - skipping Authenticode signing."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        env:
          SIGNING_PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}

      - name: Authenticode sign (RecoveryCommander.exe)
        if: steps.sign_decision.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pfxPath = Join-Path $env:RUNNER_TEMP "code-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          try {
            $signtool = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
            if (-not (Test-Path $signtool)) {
              # Fallback: pick the newest signtool.exe present.
              $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                           Where-Object { $_.FullName -like "*x64*" } |
                           Sort-Object FullName -Descending | Select-Object -First 1).FullName
            }
            if (-not $signtool -or -not (Test-Path $signtool)) { throw "signtool.exe not found on runner." }

            & $signtool sign `
              /f $pfxPath /p $env:SIGNING_PFX_PASSWORD `
              /fd SHA256 /tr https://timestamp.digicert.com /td SHA256 `
              ./publish/Release/RecoveryCommander.exe
          }
          finally {
            if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force }
          }
        env:
          SIGNING_PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}

      # ----- NuGet push (only Core + Contracts packages, never wildcard) -----
      - name: Push Core + Contracts packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pkgs = @()
          $pkgs += Get-ChildItem -Path Core -Recurse -Filter *.nupkg -ErrorAction SilentlyContinue
          $pkgs += Get-ChildItem -Path RecoveryCommander.Contracts -Recurse -Filter *.nupkg -ErrorAction SilentlyContinue
          if ($pkgs.Count -eq 0) {
            Write-Host "No nupkgs found under Core/ or RecoveryCommander.Contracts/ - skipping push."
            return
          }
          foreach ($p in $pkgs) {
            Write-Host "Pushing $($p.FullName)"
            dotnet nuget push $p.FullName `
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
              --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: RecoveryCommander-Windows-x64-${{ matrix.configuration }}
          path: ./publish/${{ matrix.configuration }}/

      # ----- Release packaging (tag-only) -----
      - name: Zip Release Asset
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Release'
        run: Compress-Archive -Path ./publish/Release/* -DestinationPath ./publish/RecoveryCommander-${{ github.ref_name }}.zip -Force

      - name: Compute SHA256SUMS
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $zip = "./publish/RecoveryCommander-${{ github.ref_name }}.zip"
          $sum = (Get-FileHash -Algorithm SHA256 -Path $zip).Hash.ToLower()
          $line = "$sum  $(Split-Path $zip -Leaf)"
          $line | Out-File -FilePath ./publish/SHA256SUMS.txt -Encoding ascii -Force
          Write-Host $line

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/RecoveryCommander-${{ github.ref_name }}.zip
            ./publish/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
